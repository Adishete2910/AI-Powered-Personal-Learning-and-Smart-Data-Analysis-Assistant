[theme]
primaryColor = "#1f77b4"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"

[server]
port = 8501
maxUploadSize = 1024
enableXsrfProtection = true
enableCORS = true
enableWebsocketCompression = true
headless = false

[logger]
level = "info"
